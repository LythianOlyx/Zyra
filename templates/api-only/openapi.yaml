openapi: 3.0.3
info:
  title: [[.AppName]] API
  description: Headless Go Actions RPC and Auth API generated by Zyra Framework.
  version: 1.0.0
servers:
  - url: http://localhost:3000
paths:
  /api/auth/login:
    post:
      summary: Authenticate and receive session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  token:
                    type: string
  /_zyra/action/actions/ListTasks:
    post:
      summary: List all tasks
      responses:
        '200':
          description: Array of tasks
  /_zyra/action/actions/CreateTask:
    post:
      summary: Create a new task (Authenticated)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Created task
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
